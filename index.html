<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFHL - Graph & Tree Processing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 4px;
      background: #667eea;
      border-radius: 50%;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .input-hint {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-clear {
      background: #f5f5f5;
      color: #333;
      border: 2px solid #e0e0e0;
    }

    .btn-clear:hover {
      background: #efefef;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #667eea;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-error {
      background: #fee;
      border: 2px solid #f99;
      color: #c33;
      display: block;
    }

    .alert-success {
      background: #efe;
      border: 2px solid #9f9;
      color: #3c3;
      display: block;
    }

    .output-section {
      display: none;
      margin-top: 30px;
      border-top: 2px solid #e0e0e0;
      padding-top: 30px;
    }

    .output-section.active {
      display: block;
    }

    .json-container {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      max-height: 500px;
      overflow-y: auto;
    }

    .json-key {
      color: #667eea;
      font-weight: 600;
    }

    .json-string {
      color: #22a;
    }

    .json-number {
      color: #d73;
    }

    .json-boolean {
      color: #c33;
    }

    .json-null {
      color: #999;
      font-style: italic;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab-btn {
      padding: 8px 16px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      color: #666;
      font-weight: 500;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .stat-box {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .stat-value {
      font-size: 24px;
      color: #667eea;
      font-weight: 700;
    }

    .tree-item {
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
    }

    .tree-root {
      font-weight: 600;
      color: #667eea;
      margin-bottom: 6px;
    }

    .tree-depth {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .tree-structure {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #333;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .cycle-badge {
      display: inline-block;
      background: #f99;
      color: #c33;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    .response-time {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 20px;
      }

      .button-group {
        flex-direction: column;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-wrap: wrap;
      }

      .json-container {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🌳 BFHL - Graph & Tree Processing</h1>
      <p>SRM Full Stack Engineering Challenge</p>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Input Section -->
      <div class="section">
        <div class="section-title">Input Data</div>
        <textarea id="inputData" placeholder='Enter array of strings in JSON format:
["A->B", "A->C", "B->D"]

Valid format: "X->Y" where X and Y are single uppercase letters (A-Z)
Invalid: "hello", "1->2", "AB->C", "A-B", "A->", "A->A", empty string'></textarea>
        <div class="input-hint">
          <strong>💡 Format:</strong> Valid entries must be "X->Y" where X and Y are single uppercase letters.
          Whitespace is trimmed automatically. Duplicates are detected and stored separately.
        </div>
      </div>

      <!-- Alerts -->
      <div id="alert" class="alert"></div>

      <!-- Buttons -->
      <div class="button-group">
        <button class="btn-submit" id="submitBtn">▶ Process Data</button>
        <button class="btn-clear" id="clearBtn">Clear All</button>
      </div>

      <!-- Loading Indicator -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Processing... Please wait</div>
      </div>

      <!-- Output Section -->
      <div class="output-section" id="outputSection">
        <div class="section-title">Results</div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="hierarchies">Hierarchies</button>
          <button class="tab-btn" data-tab="metadata">Metadata</button>
          <button class="tab-btn" data-tab="raw">Raw JSON</button>
        </div>

        <!-- Tab: Hierarchies -->
        <div class="tab-content active" id="tab-hierarchies"></div>

        <!-- Tab: Metadata -->
        <div class="tab-content" id="tab-metadata"></div>

        <!-- Tab: Raw JSON -->
        <div class="tab-content" id="tab-raw">
          <div class="json-container" id="jsonOutput"></div>
        </div>

        <!-- Response Time -->
        <div class="response-time" id="responseTime"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:5000';

    // Element references
    const inputData = document.getElementById('inputData');
    const submitBtn = document.getElementById('submitBtn');
    const clearBtn = document.getElementById('clearBtn');
    const alert = document.getElementById('alert');
    const loading = document.getElementById('loading');
    const outputSection = document.getElementById('outputSection');
    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    /**
     * Parse input from textarea (can be JSON array or newline-separated)
     */
    function parseInput() {
      const input = inputData.value.trim();

      if (!input) {
        showAlert('Please enter some data', 'error');
        return null;
      }

      try {
        // Try parsing as JSON array
        const parsed = JSON.parse(input);
        if (Array.isArray(parsed)) {
          return parsed;
        }
        throw new Error('Input must be a JSON array');
      } catch (e) {
        showAlert('Invalid JSON format: ' + e.message, 'error');
        return null;
      }
    }

    /**
     * Display alert message
     */
    function showAlert(message, type = 'error') {
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alert.style.display = 'block';

      if (type === 'success') {
        setTimeout(() => {
          alert.style.display = 'none';
        }, 4000);
      }
    }

    /**
     * Submit handler
     */
    submitBtn.addEventListener('click', async () => {
      const data = parseInput();
      if (!data) return;

      submitBtn.disabled = true;
      loading.style.display = 'block';
      const startTime = performance.now();

      try {
        const response = await fetch(`${API_BASE_URL}/bfhl`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ data })
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const result = await response.json();
        const endTime = performance.now();
        const responseTime = (endTime - startTime).toFixed(2);

        displayResults(result, responseTime);
        showAlert('Data processed successfully!', 'success');

      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
        console.error(error);
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    });

    /**
     * Clear handler
     */
    clearBtn.addEventListener('click', () => {
      inputData.value = '';
      outputSection.classList.remove('active');
      alert.style.display = 'none';
      inputData.focus();
    });

    /**
     * Tab switching
     */
    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;

        // Update active button
        tabButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update active content
        tabContents.forEach(content => content.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
      });
    });

    /**
     * Display results
     */
    function displayResults(result, responseTime) {
      // Display statistics
      const statsGrid = document.getElementById('statsGrid');
      statsGrid.innerHTML = `
        <div class="stat-box">
          <div class="stat-label">Total Trees</div>
          <div class="stat-value">${result.summary.total_trees}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Total Cycles</div>
          <div class="stat-value">${result.summary.total_cycles}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Largest Tree Root</div>
          <div class="stat-value">${result.summary.largest_tree_root || '—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Invalid Entries</div>
          <div class="stat-value">${result.invalid_entries.length}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Duplicate Edges</div>
          <div class="stat-value">${result.duplicate_edges.length}</div>
        </div>
      `;

      // Display hierarchies
      const hierarchiesTab = document.getElementById('tab-hierarchies');
      hierarchiesTab.innerHTML = `
        <div style="margin-bottom: 16px;">
          <strong>Found ${result.hierarchies.length} hierarchies:</strong>
        </div>
      `;

      result.hierarchies.forEach((h, index) => {
        const html = `
          <div class="tree-item">
            <div class="tree-root">
              Root: <strong>${h.root}</strong>
              ${h.has_cycle ? '<span class="cycle-badge">CYCLE DETECTED</span>' : ''}
            </div>
            ${!h.has_cycle ? `<div class="tree-depth">Depth: ${h.depth}</div>` : ''}
            <div class="tree-structure">${formatTreeStructure(h.tree)}</div>
          </div>
        `;
        hierarchiesTab.innerHTML += html;
      });

      // Display metadata
      const metadataTab = document.getElementById('tab-metadata');
      metadataTab.innerHTML = `
        <div class="json-container">
          <div><span class="json-key">"user_id":</span> <span class="json-string">"${result.user_id}"</span></div>
          <div><span class="json-key">"email_id":</span> <span class="json-string">"${result.email_id}"</span></div>
          <div><span class="json-key">"college_roll_number":</span> <span class="json-string">"${result.college_roll_number}"</span></div>
          ${result.invalid_entries.length > 0 ? `
            <div style="margin-top: 12px;">
              <span class="json-key">"invalid_entries":</span> [${result.invalid_entries.map(e => `<span class="json-string">"${escapeHtml(e)}"</span>`).join(', ')}]
            </div>
          ` : ''}
          ${result.duplicate_edges.length > 0 ? `
            <div style="margin-top: 12px;">
              <span class="json-key">"duplicate_edges":</span> [${result.duplicate_edges.map(e => `<span class="json-string">"${e}"</span>`).join(', ')}]
            </div>
          ` : ''}
        </div>
      `;

      // Display raw JSON
      const jsonOutput = document.getElementById('jsonOutput');
      jsonOutput.textContent = JSON.stringify(result, null, 2);

      // Display response time
      const responseTimeDiv = document.getElementById('responseTime');
      responseTimeDiv.innerHTML = `⏱️ Response Time: <strong>${responseTime}ms</strong>`;

      // Show output section
      outputSection.classList.add('active');
    }

    /**
     * Format tree structure for display
     */
    function formatTreeStructure(tree) {
      if (Object.keys(tree).length === 0) {
        return '(empty - cycle detected)';
      }

      function buildString(node, indent = '') {
        const children = Object.keys(tree[node] || {}).sort();
        let result = indent + node + '\n';

        children.forEach((child, index) => {
          const isLast = index === children.length - 1;
          const nextIndent = indent + (isLast ? '  ' : '│ ');
          result += (indent + (isLast ? '└─' : '├─')) + buildString(child, nextIndent);
        });

        return result;
      }

      return buildString(Object.keys(tree)[0]);
    }

    /**
     * Escape HTML special characters
     */
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Focus on input when page loads
    window.addEventListener('load', () => {
      inputData.focus();
    });
  </script>
</body>
</html>
